name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # For trusted publishing (no token needed)

    steps:
      - uses: actions/checkout@v4
      
      - name: Build package
        run: |
          python -m pip install build
          python -m build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
